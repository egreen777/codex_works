<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>To-do</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe7;
        --bg-accent: #e7d7c9;
        --surface: rgba(255, 252, 247, 0.88);
        --surface-strong: #fffaf3;
        --text: #1f1a17;
        --muted: #6f655d;
        --line: rgba(31, 26, 23, 0.12);
        --brand: #b45309;
        --brand-strong: #92400e;
        --danger: #b42318;
        --shadow: 0 24px 80px rgba(72, 46, 22, 0.16);
        --radius: 28px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(180, 83, 9, 0.18), transparent 35%),
          radial-gradient(circle at top right, rgba(146, 64, 14, 0.16), transparent 30%),
          linear-gradient(160deg, var(--bg), var(--bg-accent));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .app {
        width: min(720px, 100%);
        background: var(--surface);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero {
        padding: 32px 32px 24px;
        background:
          linear-gradient(135deg, rgba(180, 83, 9, 0.1), rgba(255, 255, 255, 0)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.35));
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--brand-strong);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-size: 0.75rem;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1;
      }

      .subtitle {
        margin: 14px 0 0;
        max-width: 52ch;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.6;
      }

      .content {
        padding: 24px 32px 32px;
      }

      form {
        display: flex;
        gap: 12px;
      }

      .field {
        flex: 1;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 16px 18px;
        font: inherit;
        background: rgba(255, 255, 255, 0.8);
        color: inherit;
        outline: none;
        transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
      }

      .field:focus {
        border-color: rgba(180, 83, 9, 0.45);
        box-shadow: 0 0 0 4px rgba(180, 83, 9, 0.1);
      }

      .btn {
        border: 0;
        border-radius: 999px;
        padding: 0 18px;
        min-height: 54px;
        font: inherit;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, var(--brand), var(--brand-strong));
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
        box-shadow: 0 12px 30px rgba(180, 83, 9, 0.28);
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .filters {
        display: inline-flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.55);
        color: inherit;
        cursor: pointer;
        font: inherit;
        font-size: 0.88rem;
      }

      .chip[aria-pressed="true"] {
        border-color: rgba(180, 83, 9, 0.28);
        color: var(--brand-strong);
        background: rgba(180, 83, 9, 0.08);
        font-weight: 700;
      }

      .clear {
        border: 0;
        background: transparent;
        color: var(--danger);
        font: inherit;
        cursor: pointer;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 18px 0 0;
        display: grid;
        gap: 12px;
      }

      li {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 16px 16px 14px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--surface-strong);
      }

      .check {
        width: 22px;
        height: 22px;
        flex: 0 0 auto;
        accent-color: var(--brand);
      }

      .todo-text {
        flex: 1;
        line-height: 1.45;
        word-break: break-word;
      }

      .todo-text.done {
        color: var(--muted);
        text-decoration: line-through;
      }

      .delete {
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 1.2rem;
        cursor: pointer;
        padding: 4px 6px;
      }

      .empty {
        margin: 24px 0 0;
        padding: 24px;
        border: 1px dashed var(--line);
        border-radius: 20px;
        color: var(--muted);
        text-align: center;
        background: rgba(255, 255, 255, 0.45);
      }

      @media (max-width: 640px) {
        body {
          padding: 14px;
        }

        .hero,
        .content {
          padding-left: 18px;
          padding-right: 18px;
        }

        form {
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }

        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .filters {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app" aria-label="To-do app">
      <section class="hero">
        <p class="eyebrow">Daily list</p>
        <h1>To-do</h1>
        <p class="subtitle">작은 할 일을 빠르게 적고, 완료하면 지우는 아주 단순한 목록입니다. 새로고침해도 내용은 유지됩니다.</p>
      </section>

      <section class="content">
        <form id="todo-form">
          <input
            id="todo-input"
            class="field"
            type="text"
            autocomplete="off"
            maxlength="120"
            placeholder="새 할 일을 입력하세요"
            aria-label="새 할 일"
          />
          <button class="btn" type="submit">추가</button>
        </form>

        <div class="toolbar">
          <div class="filters" role="group" aria-label="할 일 필터">
            <button class="chip" type="button" data-filter="all" aria-pressed="true">전체</button>
            <button class="chip" type="button" data-filter="active" aria-pressed="false">진행 중</button>
            <button class="chip" type="button" data-filter="done" aria-pressed="false">완료</button>
          </div>
          <button class="clear" type="button" id="clear-done">완료 항목 삭제</button>
        </div>

        <ul id="todo-list" aria-live="polite"></ul>
        <p id="empty-state" class="empty" hidden>할 일이 없습니다. 첫 항목을 추가해 보세요.</p>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "codex-todos";

      const form = document.getElementById("todo-form");
      const input = document.getElementById("todo-input");
      const list = document.getElementById("todo-list");
      const emptyState = document.getElementById("empty-state");
      const clearDoneButton = document.getElementById("clear-done");
      const filterButtons = Array.from(document.querySelectorAll("[data-filter]"));

      let todos = loadTodos();
      let filter = "all";

      function loadTodos() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      }

      function saveTodos() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      }

      function createId() {
        return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
      }

      function filteredTodos() {
        return todos.filter((todo) => {
          if (filter === "active") return !todo.done;
          if (filter === "done") return todo.done;
          return true;
        });
      }

      function render() {
        const items = filteredTodos();
        list.innerHTML = "";

        emptyState.hidden = todos.length !== 0 || filter !== "all";

        if (items.length === 0) {
          if (todos.length === 0) {
            emptyState.textContent = "할 일이 없습니다. 첫 항목을 추가해 보세요.";
            emptyState.hidden = false;
          } else {
            emptyState.textContent = "이 필터에 해당하는 항목이 없습니다.";
            emptyState.hidden = false;
          }
        }

        for (const todo of items) {
          const li = document.createElement("li");

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.className = "check";
          checkbox.checked = todo.done;
          checkbox.setAttribute("aria-label", `${todo.text} 완료 상태 변경`);
          checkbox.addEventListener("change", () => {
            todo.done = checkbox.checked;
            saveTodos();
            render();
          });

          const text = document.createElement("span");
          text.className = `todo-text${todo.done ? " done" : ""}`;
          text.textContent = todo.text;

          const remove = document.createElement("button");
          remove.type = "button";
          remove.className = "delete";
          remove.setAttribute("aria-label", `${todo.text} 삭제`);
          remove.textContent = "×";
          remove.addEventListener("click", () => {
            todos = todos.filter((item) => item.id !== todo.id);
            saveTodos();
            render();
          });

          li.append(checkbox, text, remove);
          list.append(li);
        }

        updateFilterUI();
        clearDoneButton.disabled = !todos.some((todo) => todo.done);
      }

      function updateFilterUI() {
        for (const button of filterButtons) {
          const isActive = button.dataset.filter === filter;
          button.setAttribute("aria-pressed", String(isActive));
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = input.value.trim();

        if (!text) return;

        todos.unshift({
          id: createId(),
          text,
          done: false,
        });

        input.value = "";
        saveTodos();
        render();
        input.focus();
      });

      for (const button of filterButtons) {
        button.addEventListener("click", () => {
          filter = button.dataset.filter;
          render();
        });
      }

      clearDoneButton.addEventListener("click", () => {
        todos = todos.filter((todo) => !todo.done);
        saveTodos();
        render();
      });

      render();
    </script>
  </body>
</html>
